name: Fast Tests

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quick-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: latest
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Cache Poetry dependencies
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-3.13-${{ hashFiles('**/poetry.lock') }}
        restore-keys: |
          venv-${{ runner.os }}-3.13-

    - name: Install dependencies
      run: |
        poetry install --with dev --no-interaction
        
    - name: Run fast tests
      run: |
        poetry run pytest -v --tb=short \
          -m "not integration and not slow and not security and not performance and not property_based"
        
    - name: Test import of main modules
      run: |
        poetry run python -c "import data_processing.dataframe_processor; print('✓ dataframe_processor imports successfully')"
        poetry run python -c "import data_processing.date_converter; print('✓ date_converter imports successfully')"
        poetry run python -c "import data_processing.exporter; print('✓ exporter imports successfully')"
        poetry run python -c "import visualization.chart_net_dividend; print('✓ chart_net_dividend imports successfully')" || echo "⚠ chart_net_dividend import failed (may be expected)"
